name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: universal-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-targets: true
          cache-on-failure: true

      - name: Cache Tauri tools (NSIS, WiX)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/tauri
            ~/.local/share/tauri
            ~/AppData/Local/Temp/.tauri
          key: tauri-tools-${{ matrix.os }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
          sudo apt-get install -y libayatana-appindicator3-dev 2>/dev/null || \
            sudo apt-get install -y libappindicator3-dev 2>/dev/null || true

      - name: Install macOS Rust targets (universal)
        if: matrix.target == 'universal-apple-darwin'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}
        env:
          CI: 'true'

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: quant-desktop-windows
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: quant-desktop-macos
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: quant-desktop-linux
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  sign-and-publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: quant-desktop-*
          merge-multiple: true

      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Extract changelog for this version
        run: |
          VERSION="${{ github.ref_name }}"
          node scripts/extract-changelog.mjs "$VERSION" > changelog-notes.md
          echo "=== Changelog ==="
          cat changelog-notes.md

      - name: Flatten installer files
        run: |
          mkdir -p release
          find . -type f \( \
            -name "*.exe" -o -name "*.msi" -o \
            -name "*.dmg" -o \
            -name "*.deb" -o -name "*.AppImage" \
          \) -exec cp {} release/ \;
          ls -la release/

      - name: Sign and generate latest.json
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          VERSION="${{ github.ref_name }}"
          NOTES=$(jq -Rs '.' changelog-notes.md)
          echo "VERSION=$VERSION"
          echo "NOTES=$NOTES"

          npx tauri signer sign \
            --private-key <(echo "$TAURI_PRIVATE_KEY") \
            --password "$TAURI_KEY_PASSWORD" \
            --generate-latest-json \
            --version "$VERSION" \
            --notes "$NOTES" \
            release/ \
            -o latest.json

          echo "=== latest.json ==="
          cat latest.json

      - name: Publish to public release repo
        uses: softprops/action-gh-release@v2
        with:
          repository: Leaderxin/QuantDesktopRelease
          token: ${{ secrets.PUBLIC_REPO_PAT }}
          files: |
            release/*
            latest.json
          generate_release_notes: true

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: quant-desktop-*
          merge-multiple: true

      - name: Flatten installer files
        run: |
          mkdir -p release
          find . -type f \( \
            -name "*.exe" -o -name "*.msi" -o \
            -name "*.dmg" -o \
            -name "*.deb" -o -name "*.AppImage" \
          \) -exec cp {} release/ \;
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
