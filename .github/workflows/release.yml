name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-latest
            args: --target x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-targets: true
          cache-on-failure: true

      - name: Cache Tauri tools (NSIS, WiX)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/tauri
            ~/.local/share/tauri
            ~/AppData/Local/Temp/.tauri
          key: tauri-tools-${{ matrix.platform }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
          sudo apt-get install -y libayatana-appindicator3-dev 2>/dev/null || \
            sudo apt-get install -y libappindicator3-dev 2>/dev/null || true

      - name: Install macOS Rust targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Extract changelog for release body
        id: changelog
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          node scripts/extract-changelog.mjs "$VERSION" > "$RUNNER_TEMP/changelog.md" 2>/dev/null || echo "No changelog entry for $VERSION" > "$RUNNER_TEMP/changelog.md"
          echo "body<<EOF" >> $GITHUB_OUTPUT
          cat "$RUNNER_TEMP/changelog.md" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ github.ref_name }}"
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Create portable zip (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $src = "src-tauri/target/x86_64-pc-windows-msvc/release"
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          $staging = "portable/quant-desktop"
          $null = New-Item -ItemType Directory -Force -Path $staging
          Copy-Item "$src/quant-desktop.exe" -Destination "$staging/"
          $null = New-Item -ItemType File -Path "$staging/portable.dat"
          $zipName = "quant-desktop_$($ver)_x64-portable.zip"
          $null = New-Item -ItemType Directory -Force -Path "$src/bundle"
          Compress-Archive -Path "$staging/*" -DestinationPath "$src/bundle/$zipName"
          Write-Host "Portable zip created: $src/bundle/$zipName"

      - name: Upload portable zip to release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: false
          files: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/quant-desktop_*_x64-portable.zip
