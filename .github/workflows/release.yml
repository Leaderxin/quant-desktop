name: Release
# Build desktop installers for Windows, macOS, and Linux.
# Triggered on pushes to master (tags only) or manually via workflow_dispatch.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: |
              *.exe
              *.msi
              *.zip

          - os: macos-latest
            target: universal-apple-darwin
            artifact: |
              *.dmg
              *.app.tar.gz

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: |
              *.deb
              *.AppImage
              *.tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quant-desktop-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/${{ matrix.artifact }}
          if-no-files-found: error
